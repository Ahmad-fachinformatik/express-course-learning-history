<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Express Course Frontend</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Express Course Frontend</h1>
  <section>
    <h2>Customers</h2>
    <button id="loadCustomersButton">Load Customers</button>
    <div><input id="customerNameInput" placeholder="Customer name"><input id="customerCityInput" placeholder="Customer city"><button id="addCustomerButton">Add Customer</button></div><p id="customerMessage"></p>
    <div id="customersResult"></div>
  </section>
  <section>
    <h2>Products</h2>
    <button id="loadProductsButton">Load Products</button>
    <div><input id="productNameInput" placeholder="Product name"><input id="productPriceInput" placeholder="Product price"><button id="addProductButton">Add Product</button></div><p id="productMessage"></p>
    <div id="productsResult"></div>
  </section>
  <script src="script.js"></script>
</body>
</html>
